name: Deploy stargazer atlas

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 01:00（北京时间 09:00）刷新数据并重新发布
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "atlas/**"
      - ".github/workflows/atlas.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh stargazer data
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python atlas/fetch_stargazers.py
          python atlas/process.py

      - name: Assemble site (static files only)
        run: |
          mkdir _site
          cp atlas/index.html atlas/echarts.min.js atlas/worldgeo.js atlas/data.js _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
